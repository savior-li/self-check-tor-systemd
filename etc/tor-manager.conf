#===============================================================================
# Tor Manager Configuration File
# Tor 管理器配置文件
#===============================================================================

#-------------------------------------------------------------------------------
# 彩色输出
#-------------------------------------------------------------------------------
# 是否启用彩色输出 (true/false)
ENABLE_COLOR=false

#-------------------------------------------------------------------------------
# 日志配置
#-------------------------------------------------------------------------------
# 日志级别: debug, info, warn, error, fatal
LOG_LEVEL=info

#-------------------------------------------------------------------------------
# 路径配置
#-------------------------------------------------------------------------------
# Tor 安装路径（默认当前目录下的 tor）
TOR_INSTALL_DIR=

# Tor 配置文件路径（默认当前目录下的 torrc）
TORRC_PATH=

# Tor 数据目录（默认当前目录下的 data）
TOR_DATA_DIR=

#-------------------------------------------------------------------------------
# 网络配置
#-------------------------------------------------------------------------------
# SOCKS 端口
SOCKS_PORT=9050

# Control 端口
CONTROL_PORT=9051

#-------------------------------------------------------------------------------
# 出口节点配置
#-------------------------------------------------------------------------------
# 出口节点国家（留空自动选择）
EXIT_NODES=

# 排除出口节点国家（默认排除中国、俄罗斯、朝鲜）
EXCLUDE_EXIT_NODES={CN},{RU},{KP}

#-------------------------------------------------------------------------------
# 健康检测配置
#-------------------------------------------------------------------------------
# 检测间隔（秒）
CHECK_INTERVAL=300

# 最大连续失败次数（超过后自动重启）
MAX_FAILURES=3

# 检测超时（秒）
CHECK_TIMEOUT=30

#-------------------------------------------------------------------------------
# 备份配置
#-------------------------------------------------------------------------------
# 配置文件备份数量
MAX_BACKUPS=20